name: ESP32 Firmware Release

on:
  push:
    tags:
      - 'rns-esp32-v*'

concurrency:
  group: esp32-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#rns-esp32-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake python3 python3-venv \
            libusb-1.0-0 pkg-config libudev-dev

      - name: Install espup and Espressif Rust toolchain
        run: |
          curl -L https://github.com/esp-rs/espup/releases/latest/download/espup-x86_64-unknown-linux-gnu -o espup
          chmod +x espup
          ./espup install --targets esp32s3
          rm espup

      - name: Persist ESP environment
        run: cat "$HOME/export-esp.sh" >> "$GITHUB_ENV"

      - name: Install ldproxy and espflash
        run: cargo install ldproxy espflash --locked

      - name: Cache ESP-IDF and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            rns-esp32/.embuild
            rns-esp32/target
          key: esp32-build-${{ hashFiles('rns-esp32/Cargo.lock', 'rns-esp32/sdkconfig.defaults') }}
          restore-keys: esp32-build-

      - name: Build firmware
        working-directory: rns-esp32
        run: cargo build --release

      - name: Create flashable image
        run: |
          espflash save-image --chip esp32s3 --merge \
            rns-esp32/target/xtensa-esp32s3-espidf/release/rns-esp32 \
            rns-esp32-${{ steps.version.outputs.tag }}-esp32s3.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "rns-esp32 ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            rns-esp32-${{ steps.version.outputs.tag }}-esp32s3.bin
